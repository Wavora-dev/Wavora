// Wavora — Hydraulic Conveyor packaging config (Conveyor 2.0+)
//
// Distribution: installers (Mac .zip via Mac runner wrap, Windows .msix
// + .appinstaller + .exe wrapper, Linux .AppImage) are uploaded to
// GitHub Releases by .github/workflows/release.yml. Conveyor's
// site.base-url auto-resolves to the `releases/latest/download/` URL
// pattern via `app.vcs-url`, so the generated download.html / the
// `.appinstaller` reference the correct asset URLs without any extra
// hosting.
//
// Auto-update: `updates = background` (flipped from `none` - see the
// CI workflow, which now actually publishes the site/manifest that
// background checks need to find "is there a newer version"). Windows
// gets this via the `.appinstaller` + `.exe` wrapper Conveyor generates
// (previously stripped out - see the removed NOTE below - because there
// was no site for them to check against); Mac gets it via Sparkle.
// Linux's AppImage is NOT part of Conveyor's own update system (it's a
// custom appimagetool wrap around `linux-app`, output separately below,
// since Conveyor 2.0 dropped native AppImage support) - Linux users
// still redownload manually for now.
//
// Pattern adapted from https://github.com/zacharee/Bifrost (KMP +
// Conveyor 2.0 reference).

// CI / local must run `./gradlew :desktopApp:writeConveyorConfig` BEFORE
// invoking Conveyor. The shell-include form (`include "#!..."`) was
// removed because Conveyor parses Gradle stdout as HOCON, and Sentry-
// related `println("Full build detected, ...")` in composeApp+androidApp
// configuration phase corrupts that stdout when `isFullBuild=true` is
// set in CI → "Key 'Full build detected' may not be followed by ','".
include required("desktopApp/generated.conveyor.conf")

// NOTE: deliberately NOT including hydraulic's extract-native-libraries.conf.
// That helper extracts every JAR-embedded native into the top-level lib/app
// AND keeps the source tree intact — duplicating our 348 MB VLC plugin set
// (output ballooned from 989 MB to 1.4 GB). VLCJ + JNA load fine because:
//   1. DefaultVlcDiscoverer walks up from the JAR to find vlc/ at runtime
//   2. JNA's own per-JAR native unpacking still runs without the helper

app {
  // fsname / display-name / rdns-name are appended by the doLast block in
  // desktopApp/build.gradle.kts's writeConveyorConfig customisation.

  vendor      = "wavora-dev"
  description = "Wavora — Stream music from YouTube Music, free and ad-free. Futuristic UI, immersive experience."
  license     = "GPL-3.0-or-later"

  // Open source = free Conveyor. Setting `vcs-url` to the public source
  // repository qualifies Wavora for the OSS tier and removes the paid
  // license requirement. See https://hydraulic.dev/pricing.html — "free
  // for open source projects if you set the app.vcs-url key to where your
  // source repository can be found."
  //
  // Per the same clause we must advertise "Packaged with Conveyor" + link
  // to hydraulic.dev somewhere user-visible (download page, README, or
  // about screen). The auto-generated download site already embeds the
  // required badge — see TODO in docs/conveyor-local-test.md.
  vcs-url = "https://github.com/wavora-dev/Wavora"

  // Single PNG source → Conveyor auto-derives .icns / .ico / png variants
  // for mac, windows, linux. Native .icns / .ico inputs are silently
  // ignored by Conveyor 22.0 (it always re-encodes from raster source).
  icons = "composeApp/icon/circle_app_icon.png"

  // updates = background → Conveyor wires Sparkle (Mac) and the
  // .appinstaller-based background update check (Windows). Requires a
  // real, reachable site/manifest to check against - see
  // .github/workflows/release.yml, which runs `conveyor make
  // site` and publishes the result (including the manifest) as part of
  // every GitHub Release, so `site.base-url` actually resolves.
  updates = background

  // AUDIT NOTE (see release install failures — 0x80190194 / 0x80073CF0 /
  // 0x800B0109 during `Add-AppxPackage -AppInstallerFile`, while a direct
  // `Add-AppxPackage <msix>` always worked): the previous version of this
  // file relied on `site.base-url` being *auto-inferred* from `vcs-url`
  // and never pinned it explicitly. That auto-inference is undocumented
  // behaviour we can't verify against Hydraulic's docs from this
  // environment, and it is the single most likely explanation for why the
  // .msix installs perfectly (no network involved) while everything that
  // goes through the .appinstaller (which embeds absolute URLs that
  // Windows' AppInstaller service fetches over the network) fails: if the
  // inferred base URL is wrong even in one component (missing
  // `/releases/latest/download`, wrong case, trailing slash, etc.), every
  // URI inside the generated .appinstaller 404s, App Installer reports
  // that as "package could not be opened" (0x80073CF0), and — because it
  // can no longer validate the package it half-downloaded/cached — can
  // surface a certificate-chain error too (0x800B0109), even though the
  // *real* certificate is fine, as proven by the manual TrustedPeople
  // import + direct install test.
  //
  // Fix: stop relying on inference, pin it explicitly to the exact same
  // pattern GitHub uses for "latest release" asset URLs. This must match
  // vcs-url's host/org/repo casing exactly — GitHub's redirect is
  // case-insensitive for the *path*, but do not depend on that for a URL
  // an OS service resolves outside a browser.
  site {
    base-url = ${app.vcs-url}"/releases/latest/download"
    consistency-checks = warn
  }

  // Explicit machines list. Two architectures explicitly dropped because
  // of missing native dependencies upstream:
  //
  //   • linux.aarch64.glibc — VideoLAN does not ship a prebuilt VLC
  //     binary for Linux ARM ("Linux uses distro package manager"), and
  //     the mahozad/vlc-plugins-linux Maven artifact is amd64-only.
  //     Shipping a Linux ARM AppImage would crash on first VLCJ load.
  //
  //   • windows.aarch64 — androidx.sqlite:sqlite-bundled-jvm 2.6.2 (and
  //     even 2.7.0-alpha05) lacks a windows_arm64 sqliteJni.dll. The
  //     bundled driver fails Room init with "Cannot find a suitable
  //     SQLite binary for windows 11 | aarch64", which we cannot work
  //     around without building the native ourselves. Windows 11 ARM
  //     can run the x64 msix under Prism emulation in the meantime —
  //     re-enable once Google ships the win-arm64 native upstream.
  machines = [
    "windows.amd64",
    "mac.amd64", "mac.aarch64",
    "linux.amd64.glibc",
  ]

  // Per-arch VLC native libraries staged by
  // `./gradlew :composeApp:vlcSetupAll`. VideoLAN ships separate per-arch
  // binaries for Mac (arm64.dmg vs intel64.dmg) and Windows (win64.zip vs
  // winarm64.zip), so each per-machine installer only carries the slice
  // it actually needs — saves ~25-40 MB per Mac user download vs the
  // pre-split universal layout.
  windows.amd64.inputs   += { from = "vlc-natives/windows-x64",   to = "vlc" }
  mac.amd64.inputs       += { from = "vlc-natives/macos-x64",     to = "vlc" }
  mac.aarch64.inputs     += { from = "vlc-natives/macos-arm64",   to = "vlc" }
  linux.amd64.inputs     += { from = "vlc-natives/linux-x64",     to = "vlc" }

  // --- Per-OS overrides -----------------------------------------------------

  // Linux: produce the relocatable directory tree (`linux-app` task) only.
  // Conveyor 2.0 dropped native AppImage support — we wrap the tree with
  // appimagetool via `./gradlew :desktopApp:packageConveyorAppImage` to
  // ship a one-for-all-distros .AppImage. Set `targets = []` so the `site`
  // task doesn't try to emit .deb / .tar.gz that we don't ship anyway.
  linux.amd64.targets   = [ ]

  // Windows: now that `updates = background` has a real site to check
  // against (see above), the `site` task's full output - .msix,
  // .appinstaller, and the .exe installer wrapper - all get published
  // and are what actually enables silent background updates on
  // Windows. Previously these were filtered out at upload time because
  // there was no hosted site for the .appinstaller to point at (it 404'd,
  // and the .exe wrapper failed with HRESULT 0x80190194 trying to fetch
  // it); .github/workflows/release.yml no longer filters them.

  mac {
    info-plist.LSApplicationCategoryType = "public.app-category.music"
    info-plist.UIBackgroundModes         = [ "audio", "fetch", "processing" ]
    url-schemes = [ "wavora" ]
  }

  windows {
    start-menu.group = "Wavora"
    url-schemes = [ "wavora" ]
  }

  linux {
    desktop-file."Comment[en]" = "Stream music from YouTube Music, free and ad-free"
    desktop-file.Categories    = "AudioVideo;Audio;Player;Music;"
    // StartupWMClass REMOVED (audit, real CI failure): Conveyor's Linux desktop-file
    // renderer threw `ConfigException$WrongType: StartupWMClass has type STRING
    // rather than OBJECT` inside LinuxPackageContentsBuilder.maybeCreateDesktopMetadata
    // — it expects this key (or something at this same config path) to be an OBJECT,
    // not the plain string we had. Can't confirm the correct HOCON shape for it
    // without access to Hydraulic's docs from this environment, so removing it
    // rather than guessing a syntax that might introduce a different config error.
    // Purely cosmetic (Linux taskbar window-class grouping) — no functional impact.
    // TODO: find the right syntax in Conveyor's docs and re-add.
    url-schemes = [ "wavora" ]
  }

  // --- Build settings -------------------------------------------------------

  compression-level = low

  jvm {
    modules = "ALL-MODULE-PATH"
    // extract-native-libraries = true  // disabled: duplicates VLC plugins
    // (348 MB) by extracting them flat alongside keeping the original
    // tree. VLCJ + JNA load fine without this because DefaultVlcDiscoverer
    // walks up from the JAR location to find vlc/ at runtime.
    options += "--add-opens=java.base/java.nio=ALL-UNNAMED"
  }

  jvm.mac.options += "--add-opens=java.desktop/sun.awt=ALL-UNNAMED"
  jvm.mac.options += "--add-opens=java.desktop/sun.lwawt=ALL-UNNAMED"
  jvm.mac.options += "--add-opens=java.desktop/sun.lwawt.macosx=ALL-UNNAMED"
}

conveyor.compatibility-level = 21

// Loosen disk cache requirement (default 5 GB free) — local dev machines
// often have less headroom while caches keep growing. CI runners with
// fresh disks won't be affected.
conveyor.disk-cache.minimum-free-disk-space = 1 GB
